<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="cyanGradient" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#0B718B"/>
      <stop offset="0.58" stop-color="#14A3CA"/>
      <stop offset="1" stop-color="#35B9D5"/>
    </linearGradient>
    <style>
      .cn { font-family: "HarmonyOS Sans SC", "Microsoft YaHei", Arial, sans-serif; }
      .title { font-size: 44px; font-weight: 700; fill: #191D1F; }
      .subtitle { font-size: 18px; font-weight: 400; fill: #526166; }
      .section { font-size: 20px; font-weight: 700; fill: #0B718B; letter-spacing: 1px; }
      .label { font-size: 15px; font-weight: 600; fill: #191D1F; }
      .small { font-size: 12px; font-weight: 400; fill: #526166; }
      .white { fill: #FFFFFF; }
      .cyan { fill: #14A3CA; }
      .dark { fill: #191D1F; }
      .line { stroke: #D9E4E6; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#F3F7F7"/>
